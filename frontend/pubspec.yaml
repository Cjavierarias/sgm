name: sgm_frontend
description: Frontend Flutter para SaaS de mantenimiento industrial
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=2.17.0 <3.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.0.0
  provider: ^6.0.5
  google_sign_in: ^6.1.0
  flutter_dotenv: ^6.0.0
  go_router: ^6.0.4
  shared_preferences: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env

# Notas:
# - Ejecuta `flutter pub get` en la carpeta frontend/ para instalar dependencias.
# - Ajustá versiones según tu canal de Flutter/Dart.