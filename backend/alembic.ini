[alembic]
# path to migration scripts
script_location = backend/alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Logging configuration
log_file = alembic.log

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

# Nota: la URL de conexión se carga desde .env en `env.py`.
# Aquí se deja un placeholder por compatibilidad local.
; sqlalchemy.url = driver://user:pass@localhost/dbname
