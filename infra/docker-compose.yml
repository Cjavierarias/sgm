version: '3.8'

# Docker Compose para desarrollo local: db, api y nginx (reverse proxy)
# Lee variables de entorno desde un archivo `.env` en la raíz del repo.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env  # Asegurate de tener POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB en ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env  # Variables como DATABASE_URL, SECRET_KEY, GOOGLE_SERVICE_ACCOUNT_FILE
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - backend_net

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Montar certificados TLS (poner cert.pem/key.pem en infra/certs/)
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - backend_net

volumes:
  db_data:

networks:
  backend_net:
    driver: bridge

# Notas:
# - Coloca tu archivo .env en la raíz del repo (../.env respecto a infra/) con las variables necesarias.
# - Para TLS, coloca certificados en infra/certs/ como cert.pem y key.pem y referenciaos en nginx.conf.
# - Iniciar: `docker compose -f infra/docker-compose.yml up --build` desde la raíz del repo.
